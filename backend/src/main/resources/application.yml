server:
  port: 8080

spring:
  application:
    name: biometric-capture-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:biometric_capture}
    username: ${DB_USER:biometric}
    password: ${DB_PASSWORD:biometric}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

vision:
  service:
    url: ${VISION_SERVICE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
